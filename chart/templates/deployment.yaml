{{- range .Values.services }}
{{- $service := . -}}
{{- $serviceConfig := include "microservice.getServiceConfig" (dict "service" $service "root" $) | fromYaml -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "microservice.serviceName" (dict "service" $service "root" $) }}
  {{- with $.Values.namespace.name }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "microservice.serviceLabels" (dict "service" $service "root" $) | nindent 4 }}
spec:
  replicas: {{ $serviceConfig.replicaCount }}
  selector:
    matchLabels:
      {{- include "microservice.serviceSelectorLabels" (dict "service" $service "root" $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "microservice.serviceLabels" (dict "service" $service "root" $) | nindent 8 }}
    spec:
      {{- with (coalesce $.Values.imagePullSecrets $serviceConfig.imagePullSecrets) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "microservice.serviceAccountNameForService" (dict "service" $service "root" $) }}
      containers:
        - name: {{ $.Chart.Name }}
          securityContext:
            {{- toYaml $serviceConfig.securityContext | nindent 12 }}
          image: "{{ $serviceConfig.image.repository }}:{{ $serviceConfig.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $serviceConfig.image.pullPolicy }}
          args:
            - "serve"
            - "--port={{ $serviceConfig.config.port }}"
            - "--service-name={{ $serviceConfig.config.serviceName }}"
            - "--timeout={{ $serviceConfig.config.timeout }}"
            - "--log-level={{ $serviceConfig.config.logLevel }}"
            - "--log-format={{ $serviceConfig.config.logFormat }}"
            - "--log-headers={{ $serviceConfig.config.logHeaders }}"
            - "--propagate-request-headers={{ $serviceConfig.config.propagateRequestHeaders }}"
            - "--propagate-response-headers={{ $serviceConfig.config.propagateResponseHeaders }}"
            {{- if $serviceConfig.config.tls }}
            {{- if or $serviceConfig.config.tls.existingSecret (and $serviceConfig.config.tls.cert $serviceConfig.config.tls.key) }}
            - "--tls-cert=/etc/tls/tls.crt"
            - "--tls-key=/etc/tls/tls.key"
            {{- if $serviceConfig.config.tls.insecure }}
            - "--upstream-tls-insecure"
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if $serviceConfig.config.additionalCACerts }}
            {{- range $i, $caCert := $serviceConfig.config.additionalCACerts }}
            - "--additional-ca-cert=/etc/additional-ca-certs/{{ $i }}/ca.crt"
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ $serviceConfig.config.port }}
              protocol: TCP
          {{- $hasTLS := and $serviceConfig.config.tls (or $serviceConfig.config.tls.existingSecret (and $serviceConfig.config.tls.cert $serviceConfig.config.tls.key)) }}
          {{- $hasCACerts := $serviceConfig.config.additionalCACerts }}
          {{- if or $hasTLS $hasCACerts }}
          volumeMounts:
            {{- if $hasTLS }}
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
            {{- end }}
            {{- if $hasCACerts }}
            {{- range $i, $caCert := $serviceConfig.config.additionalCACerts }}
            - name: ca-cert-{{ $i }}
              mountPath: /etc/additional-ca-certs/{{ $i }}
              readOnly: true
            {{- end }}
            {{- end }}
          {{- end }}
          livenessProbe:
            {{- toYaml $serviceConfig.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml $serviceConfig.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml $serviceConfig.resources | nindent 12 }}
      {{- $hasTLS := and $serviceConfig.config.tls (or $serviceConfig.config.tls.existingSecret (and $serviceConfig.config.tls.cert $serviceConfig.config.tls.key)) }}
      {{- $hasCACerts := $serviceConfig.config.additionalCACerts }}
      {{- if or $hasTLS $hasCACerts }}
      volumes:
        {{- if $hasTLS }}
        - name: tls-certs
          secret:
            {{- if $serviceConfig.config.tls.existingSecret }}
            secretName: {{ $serviceConfig.config.tls.existingSecret }}
            {{- else }}
            secretName: {{ include "microservice.serviceName" (dict "service" $service "root" $) }}-tls
            {{- end }}
        {{- end }}
        {{- if $hasCACerts }}
        {{- range $i, $caCert := $serviceConfig.config.additionalCACerts }}
        {{- if not (or $caCert.existingSecret (or $caCert.existingConfigMap $caCert.cert)) }}
        {{- fail (printf "additionalCACerts[%d]: must set one of existingSecret, existingConfigMap, or cert" $i) }}
        {{- end }}
        - name: ca-cert-{{ $i }}
          {{- if $caCert.existingSecret }}
          secret:
            secretName: {{ $caCert.existingSecret }}
          {{- else if $caCert.existingConfigMap }}
          configMap:
            name: {{ $caCert.existingConfigMap }}
          {{- else }}
          configMap:
            name: {{ include "microservice.serviceName" (dict "service" $service "root" $) }}-ca-{{ $i }}
          {{- end }}
        {{- end }}
        {{- end }}
      {{- end }}
---
{{- end }}